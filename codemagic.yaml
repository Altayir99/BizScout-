workflows:
  ios-release:
    name: BizScout iOS — TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: admin key

    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.app.bizscout

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Set up keychain
        script: |
          keychain initialize

      - name: Set up provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa --release --build-number=$PROJECT_BUILD_NUMBER

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_days: 20
