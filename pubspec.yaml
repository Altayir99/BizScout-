name: bizscout
description: "BizScout — Business Intelligence for Gastronomie & Zeitarbeit"
publish_to: 'none'
version: 1.0.2+16

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.7.0

  # State management
  provider: ^6.1.2

  # DI
  get_it: ^7.7.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.6
  url_launcher: ^6.3.1

  # Utils
  intl: ^0.20.2
  pretty_dio_logger: ^1.4.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.4
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  ios: true
  android: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
